<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Olivia's Kitchen &#x1F451;</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(135deg, #fdf6ec 0%, #fce4c8 100%);
      min-height: 100vh;
      padding: 20px;
    }

    /* LOGIN */
    .login {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 14px;
    }
    .login-card {
      background: white;
      border-radius: 28px;
      box-shadow: 0 8px 40px rgba(180,100,40,0.15);
      padding: 40px 36px;
      max-width: 360px;
      width: 100%;
      text-align: center;
    }
    .login-icon { font-size: 3.5rem; margin-bottom: 12px; }
    .login-card h1 {
      font-family: 'Pacifico', cursive;
      color: #7b3f00;
      font-size: 2rem;
      margin-bottom: 6px;
    }
    .login-card p { color: #a0714f; font-weight: 600; margin-bottom: 20px; }
    .login-card input {
      width: 100%;
      padding: 14px;
      border: 2.5px solid #e8d5c0;
      border-radius: 14px;
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      text-align: center;
      outline: none;
      margin-bottom: 12px;
      letter-spacing: 0.2em;
    }
    .login-card input:focus { border-color: #c8783a; }
    .login-card button {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #c8783a, #9b4f1e);
      color: white;
      border: none;
      border-radius: 14px;
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.2s;
    }
    .login-card button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(155,79,30,0.4); }
    .login-error {
      color: #e05252;
      font-size: 0.88rem;
      font-weight: 700;
      margin-top: 8px;
      display: none;
    }

    /* DASHBOARD */
    .dashboard { display: none; max-width: 480px; margin: 0 auto; }

    .dash-header {
      text-align: center;
      padding: 24px 0 20px;
    }
    .dash-header h1 {
      font-family: 'Pacifico', cursive;
      color: #7b3f00;
      font-size: 2rem;
    }
    .live-indicator {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #4caf50;
      font-size: 0.85rem;
      font-weight: 700;
      margin-top: 6px;
    }
    .live-dot {
      width: 8px; height: 8px;
      background: #4caf50;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* STATS */
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }
    .stat-box {
      border-radius: 20px;
      padding: 20px 16px;
      text-align: center;
    }
    .stat-box.money {
      background: linear-gradient(135deg, #c8783a, #9b4f1e);
      box-shadow: 0 4px 20px rgba(155,79,30,0.3);
      color: white;
    }
    .stat-box.orders {
      background: white;
      box-shadow: 0 4px 20px rgba(180,100,40,0.1);
    }
    .stat-label {
      font-size: 0.72rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 6px;
    }
    .stat-box.money .stat-label { opacity: 0.8; }
    .stat-box.orders .stat-label { color: #a0714f; }
    .stat-value {
      font-family: 'Pacifico', cursive;
      font-size: 2.2rem;
    }
    .stat-box.orders .stat-value { color: #7b3f00; }

    /* SECTION */
    .section-title {
      font-family: 'Pacifico', cursive;
      color: #7b3f00;
      font-size: 1.15rem;
      margin-bottom: 12px;
    }

    /* ORDER CARDS */
    .order-card {
      background: white;
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 2px 12px rgba(180,100,40,0.08);
      border: 2px solid transparent;
      transition: all 0.3s;
    }
    .order-card.done-card {
      border-color: #a5d6a7;
      opacity: 0.65;
    }
    .order-card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }
    .order-info { flex: 1; }
    .order-name {
      font-weight: 800;
      color: #7b3f00;
      font-size: 0.97rem;
    }
    .order-notes {
      color: #a0714f;
      font-size: 0.82rem;
      margin-top: 3px;
    }
    .order-time {
      color: #c4a882;
      font-size: 0.78rem;
      margin-top: 3px;
    }
    .order-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 5px;
    }
    .price-badge {
      background: #fff3e8;
      color: #c8783a;
      font-weight: 800;
      font-size: 0.85rem;
      padding: 3px 10px;
      border-radius: 20px;
    }
    .status-badge {
      font-weight: 800;
      font-size: 0.75rem;
      padding: 3px 10px;
      border-radius: 20px;
    }
    .status-badge.pending { background: #fff8e1; color: #f59f00; }
    .status-badge.done { background: #e8f5e9; color: #43a047; }

    .done-btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 12px;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 0.85rem;
      cursor: pointer;
      margin-top: 12px;
      transition: all 0.2s;
    }
    .done-btn.mark { background: linear-gradient(135deg, #4caf50, #388e3c); color: white; }
    .done-btn.undo { background: #f0e8e0; color: #7b3f00; }
    .done-btn:hover { opacity: 0.88; }

    .no-orders {
      text-align: center;
      color: #c4a882;
      padding: 40px 20px;
      font-size: 0.95rem;
      background: white;
      border-radius: 18px;
      margin-bottom: 12px;
    }

    .clear-btn {
      width: 100%;
      padding: 12px;
      background: none;
      border: 2px solid #e8d5c0;
      border-radius: 12px;
      color: #c4a882;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      cursor: pointer;
      margin-bottom: 24px;
      transition: all 0.2s;
    }
    .clear-btn:hover { border-color: #e05252; color: #e05252; }

    .back-link {
      text-align: center;
      margin-bottom: 30px;
    }
    .back-link a {
      color: #c4a882;
      font-size: 0.85rem;
      font-weight: 700;
      text-decoration: none;
    }
    .back-link a:hover { color: #a0714f; }

    .new-badge {
      background: #ff5252;
      color: white;
      font-size: 0.65rem;
      font-weight: 800;
      padding: 2px 7px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-left: 6px;
      animation: blink 1s infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div class="login" id="loginScreen">
    <div class="login-card">
      <div class="login-icon">&#x1F451;</div>
      <h1>Olivia's Kitchen</h1>
      <p>Enter your secret password</p>
      <input type="password" id="pwInput" placeholder="&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;" onkeydown="if(event.key==='Enter')tryLogin()" />
      <button onclick="tryLogin()">&#x1F451; Enter</button>
      <p class="login-error" id="loginErr">Wrong password! Try again &#x274C;</p>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div class="dashboard" id="dashboard">
    <div class="dash-header">
      <h1>&#x1F451; Olivia's Kitchen</h1>
      <div class="live-indicator">
        <span class="live-dot"></span> Live
      </div>
    </div>

    <div class="stats">
      <div class="stat-box money">
        <div class="stat-label">&#x1F4B0; Total Earned</div>
        <div class="stat-value" id="totalEarned">$0</div>
      </div>
      <div class="stat-box orders">
        <div class="stat-label">&#x2615; Orders</div>
        <div class="stat-value" id="totalOrders">0</div>
      </div>
    </div>

    <div class="section-title">&#x1F4CB; Orders</div>
    <div id="ordersList">
      <div class="no-orders">Waiting for Dad to order... &#x2615;</div>
    </div>
    <button class="clear-btn" onclick="clearAll()">&#x1F5D1; Clear all orders</button>

    <div class="back-link">
      <a href="/">&#x2190; Back to Coffee Shop</a>
    </div>
  </div>

  <script>
    const firebaseConfig = { databaseURL: "https://olivia-coffee-default-rtdb.firebaseio.com" }
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const ordersRef = db.ref('orders');
    const SECRET = 'olivia';

    function tryLogin() {
      const val = document.getElementById('pwInput').value.toLowerCase().trim();
      if (val === SECRET) {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        startListening();
      } else {
        document.getElementById('loginErr').style.display = 'block';
        document.getElementById('pwInput').value = '';
        document.getElementById('pwInput').focus();
      }
    }

    let prevCount = 0;

    function startListening() {
      ordersRef.on('value', snapshot => {
        const data = snapshot.val();
        const list = document.getElementById('ordersList');

        if (!data) {
          list.innerHTML = '<div class="no-orders">Waiting for Dad to order... &#x2615;</div>';
          document.getElementById('totalEarned').textContent = '$0';
          document.getElementById('totalOrders').textContent = '0';
          prevCount = 0;
          return;
        }

        const entries = Object.entries(data).reverse();
        const total = entries.reduce((sum, [, o]) => sum + (o.price || 3), 0);
        const newCount = entries.length;

        document.getElementById('totalEarned').textContent = '$' + total;
        document.getElementById('totalOrders').textContent = newCount;

        if (newCount > prevCount && prevCount > 0) {
          document.title = '&#x1F6A8; New Order! - Olivia\'s Kitchen';
          setTimeout(() => document.title = 'Olivia\'s Kitchen &#x1F451;', 3000);
        }
        prevCount = newCount;

        list.innerHTML = entries.map(([key, o], i) => `
          <div class="order-card ${o.done ? 'done-card' : ''}">
            <div class="order-card-top">
              <div class="order-info">
                <div class="order-name">
                  ${o.temp} ${o.size} ${o.drink}
                  ${i === 0 && !o.done ? '<span class="new-badge">New!</span>' : ''}
                </div>
                ${o.notes ? `<div class="order-notes">&#x1F4DD; ${o.notes}</div>` : ''}
                <div class="order-time">&#x1F550; ${o.time}</div>
              </div>
              <div class="order-right">
                <span class="price-badge">$${o.price || 3}</span>
                <span class="status-badge ${o.done ? 'done' : 'pending'}">
                  ${o.done ? '&#x2705; Done' : '&#x23F3; Pending'}
                </span>
              </div>
            </div>
            <button class="done-btn ${o.done ? 'undo' : 'mark'}" onclick="toggleDone('${key}', ${!!o.done})">
              ${o.done ? '&#x21A9; Mark as Pending' : '&#x2705; Mark as Done'}
            </button>
          </div>
        `).join('');
      });
    }

    function toggleDone(key, isDone) {
      ordersRef.child(key).update({ done: !isDone });
    }

    function clearAll() {
      if (confirm('Clear all orders? This cannot be undone.')) {
        ordersRef.remove();
      }
    }
  </script>
</body>
</html>
